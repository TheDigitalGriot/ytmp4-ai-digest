<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ytmp4 — Video Comparison Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --panel-bg: #0d0f1a;
  --card-bg: #1a1d2e;
  --entry-bg: #0f1117;
  --border-panel: #1e2235;
  --border-card: #2d3148;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --brand-purple: #a78bfa;
  --active-purple: #7c3aed;
  --blue: #60a5fa;
  --green: #34d399;
  --yellow: #fbbf24;
  --pink: #f472b6;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text-primary);
  overflow: hidden;
}

#app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ── History Panel ── */
#history-panel {
  width: 260px;
  min-width: 260px;
  background: var(--panel-bg);
  border-right: 1px solid var(--border-panel);
  display: flex;
  flex-direction: column;
  transition: width 0.25s ease, min-width 0.25s ease;
  overflow: hidden;
  position: relative;
}

#history-panel.collapsed {
  width: 48px;
  min-width: 48px;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 14px 10px;
  flex-shrink: 0;
}

.panel-header h2 {
  font-size: 13px;
  font-weight: 700;
  color: var(--brand-purple);
  white-space: nowrap;
}

.panel-toggle {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  line-height: 1;
}
.panel-toggle:hover { color: var(--text-primary); background: var(--card-bg); }

.panel-search {
  padding: 0 14px 10px;
  flex-shrink: 0;
}

.panel-search input {
  width: 100%;
  background: var(--card-bg);
  border: 1px solid var(--border-card);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--text-primary);
  font-size: 12px;
  outline: none;
}
.panel-search input::placeholder { color: var(--text-muted); }
.panel-search input:focus { border-color: var(--brand-purple); }

.panel-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 8px;
}

.panel-list::-webkit-scrollbar { width: 4px; }
.panel-list::-webkit-scrollbar-track { background: transparent; }
.panel-list::-webkit-scrollbar-thumb { background: var(--border-card); border-radius: 2px; }

.date-group-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 6px 4px;
}

.session-card {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  border-left: 3px solid transparent;
  margin-bottom: 2px;
  transition: background 0.15s;
}
.session-card:hover { background: var(--card-bg); }
.session-card.active {
  border-left-color: var(--active-purple);
  background: #1e293b;
}

.session-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 3px;
  color: #fff;
  flex-shrink: 0;
  margin-top: 2px;
}
.session-badge.multi { background: var(--active-purple); }
.session-badge.single { background: #1e40af; }

.session-info {
  min-width: 0;
  flex: 1;
}
.session-time {
  font-size: 10px;
  color: var(--text-muted);
}
.session-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.session-channels {
  font-size: 10px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.panel-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border-panel);
  font-size: 10px;
  color: var(--text-muted);
  flex-shrink: 0;
  white-space: nowrap;
}

/* ── Collapsed Panel ── */
.collapsed-content {
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 10px;
  gap: 6px;
  overflow-y: auto;
  flex: 1;
}

#history-panel.collapsed .expanded-content { display: none; }
#history-panel.collapsed .collapsed-content { display: flex; }

.collapsed-toggle {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 6px;
  border-radius: 4px;
  margin-bottom: 4px;
}
.collapsed-toggle:hover { color: var(--text-primary); background: var(--card-bg); }

.collapsed-badge {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  background: #1e293b;
  color: var(--text-secondary);
  position: relative;
  transition: background 0.15s;
}
.collapsed-badge:hover { background: var(--card-bg); }
.collapsed-badge.active {
  background: var(--active-purple);
  border: 2px solid #9333ea;
  color: #fff;
}

.collapsed-badge .tooltip {
  display: none;
  position: absolute;
  left: calc(100% + 10px);
  top: 50%;
  transform: translateY(-50%);
  background: #1e293b;
  border: 1px solid #334155;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 11px;
  color: var(--text-primary);
  white-space: nowrap;
  z-index: 100;
  pointer-events: none;
}
.collapsed-badge .tooltip::before {
  content: '';
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translateY(-50%);
  border: 5px solid transparent;
  border-right-color: #334155;
}
.collapsed-badge .tooltip::after {
  content: '';
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translateY(-50%);
  border: 4px solid transparent;
  border-right-color: #1e293b;
}
.collapsed-badge:hover .tooltip { display: block; }

/* ── Main Content ── */
#main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* ── Nav Bar ── */
#nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 48px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border-card);
  flex-shrink: 0;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.nav-brand {
  font-weight: 800;
  font-size: 15px;
  color: var(--brand-purple);
  flex-shrink: 0;
}
.nav-sep {
  color: var(--border-card);
  font-size: 18px;
  flex-shrink: 0;
}
.nav-title {
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-tabs {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.nav-tab {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.nav-tab:hover { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
.nav-tab.active { color: var(--blue); background: rgba(96,165,250,0.12); }

/* ── Tab Content ── */
#tab-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
}

#tab-content::-webkit-scrollbar { width: 6px; }
#tab-content::-webkit-scrollbar-track { background: transparent; }
#tab-content::-webkit-scrollbar-thumb { background: var(--border-card); border-radius: 3px; }

/* ── Dashboard ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border-card);
  border-radius: 10px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.stat-value {
  font-size: 28px;
  font-weight: 800;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--border-card);
  border-radius: 10px;
  padding: 18px 20px;
  margin-bottom: 20px;
}
.card-header {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 10px;
}
.card p {
  color: var(--text-secondary);
  line-height: 1.6;
}

/* Topic Map */
.topic-bar-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.topic-name {
  width: 140px;
  font-size: 12px;
  font-weight: 600;
  text-align: right;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topic-bar-track {
  flex: 1;
  height: 20px;
  background: var(--entry-bg);
  border-radius: 4px;
  overflow: hidden;
}
.topic-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease;
}
.topic-coverage {
  width: 90px;
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* Video cards grid */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}
.video-card {
  background: var(--entry-bg);
  border: 1px solid var(--border-card);
  border-radius: 8px;
  overflow: hidden;
}
.video-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: #161825;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 11px;
  overflow: hidden;
}
.video-thumb img { width: 100%; height: 100%; object-fit: cover; }
.video-meta {
  padding: 10px 12px;
}
.video-meta-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.video-meta-channel {
  font-size: 11px;
  color: var(--text-secondary);
}
.video-meta-duration {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Key moments grid */
.moments-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.moment-card {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border-card);
  background: var(--entry-bg);
}
.moment-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: #161825;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.moment-thumb img { width: 100%; height: 100%; object-fit: cover; }
.moment-timestamp {
  position: absolute;
  bottom: 4px;
  right: 4px;
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
}
.moment-info {
  padding: 8px 10px;
}
.moment-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-primary);
}
.moment-source {
  font-size: 10px;
  margin-top: 2px;
}

/* Topic accordion */
.topic-section { background: #1a1d2e; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
.topic-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #2d3148; cursor: pointer; }
.topic-header:hover { background: #1e293b; }
.topic-entries { padding: 12px 16px; display: grid; gap: 10px; }
.topic-entry { display: flex; gap: 12px; background: #0f1117; border-radius: 6px; padding: 10px; }
.topic-thumb { width: 80px; height: 48px; background: #1e293b; border-radius: 4px; flex-shrink: 0; position: relative; overflow: hidden; }
.topic-thumb img { width: 100%; height: 100%; object-fit: cover; }
.topic-thumb .ts-overlay { position: absolute; bottom: 2px; right: 4px; background: rgba(0,0,0,0.7); color: white; font-size: 8px; padding: 1px 3px; border-radius: 2px; }

/* Placeholder tabs */
.placeholder-tab {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 300px;
  color: var(--text-muted);
  font-size: 16px;
  font-weight: 600;
}
</style>
</head>
<body>

<div id="app">
  <aside id="history-panel">
    <div class="expanded-content">
      <div class="panel-header">
        <h2>Session History</h2>
        <button class="panel-toggle" onclick="togglePanel()" title="Collapse">&laquo;</button>
      </div>
      <div class="panel-search">
        <input type="text" id="session-search" placeholder="Search sessions..." oninput="filterSessions(this.value)">
      </div>
      <div class="panel-list" id="panel-list-expanded"></div>
      <div class="panel-footer" id="panel-footer"></div>
    </div>
    <div class="collapsed-content">
      <button class="collapsed-toggle" onclick="togglePanel()" title="Expand">&raquo;</button>
      <div id="panel-list-collapsed"></div>
    </div>
  </aside>

  <div id="main-content">
    <nav id="nav-bar">
      <div class="nav-left">
        <span class="nav-brand">ytmp4</span>
        <span class="nav-sep">|</span>
        <span class="nav-title" id="nav-session-title">Loading...</span>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</button>
        <button class="nav-tab" data-tab="by-topic" onclick="switchTab('by-topic')">By Topic</button>
        <button class="nav-tab" data-tab="by-video" onclick="switchTab('by-video')">By Video</button>
      </div>
    </nav>
    <div id="tab-content"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const TOPIC_COLORS = ['#60a5fa', '#34d399', '#fbbf24', '#f472b6', '#a78bfa'];

  let allSessions = [];
  let currentSessionData = null;
  let panelCollapsed = false;
  let activeTab = 'dashboard';

  // ── Data Loading ──

  async function loadSessions() {
    try {
      const res = await fetch('/api/sessions');
      if (!res.ok) throw new Error('fetch failed');
      allSessions = await res.json();
    } catch {
      // Static artifact fallback
      if (window.__COMPARISON_DATA__) {
        allSessions = [{
          id: 'static',
          title: window.__COMPARISON_DATA__.title || 'Comparison',
          video_count: (window.__COMPARISON_DATA__.videos || []).length,
          channels: (window.__COMPARISON_DATA__.videos || []).map(v => v.channel),
          created_at: new Date().toISOString()
        }];
      }
    }
    renderHistoryPanel(allSessions);
  }

  async function loadSession(id) {
    try {
      if (id === 'static' && window.__COMPARISON_DATA__) {
        currentSessionData = window.__COMPARISON_DATA__;
      } else {
        const res = await fetch('/api/session/' + id);
        if (!res.ok) throw new Error('fetch failed');
        currentSessionData = await res.json();
      }
    } catch {
      if (window.__COMPARISON_DATA__) {
        currentSessionData = window.__COMPARISON_DATA__;
      }
    }
    // Update nav title
    document.getElementById('nav-session-title').textContent =
      currentSessionData?.title || 'Untitled Session';
    // Mark active in panel
    document.querySelectorAll('.session-card').forEach(el => {
      el.classList.toggle('active', el.dataset.id === String(id));
    });
    document.querySelectorAll('.collapsed-badge').forEach(el => {
      el.classList.toggle('active', el.dataset.id === String(id));
    });
    // Render active tab
    renderActiveTab();
  }

  // ── History Panel ──

  function renderHistoryPanel(sessions) {
    const groups = groupByDate(sessions);
    let expandedHTML = '';
    let collapsedHTML = '';
    let totalVideos = 0;

    sessions.forEach(s => { totalVideos += s.video_count || 0; });

    for (const [label, items] of Object.entries(groups)) {
      expandedHTML += '<div class="date-group-label">' + escHTML(label) + '</div>';
      for (const s of items) {
        const count = s.video_count || 0;
        const badgeClass = count > 1 ? 'multi' : 'single';
        const time = formatTime(s.created_at);
        const channels = (s.channels || []).join(', ');
        const isActive = currentSessionData && (s.id === currentSessionData.id || s.id === 'static');
        expandedHTML +=
          '<div class="session-card' + (isActive ? ' active' : '') + '" data-id="' + s.id + '" onclick="window.__app.loadSession(\'' + s.id + '\')">' +
            '<span class="session-badge ' + badgeClass + '">' + count + '</span>' +
            '<div class="session-info">' +
              '<div class="session-time">' + escHTML(time) + '</div>' +
              '<div class="session-title">' + escHTML(s.title || 'Untitled') + '</div>' +
              (channels ? '<div class="session-channels">' + escHTML(channels) + '</div>' : '') +
            '</div>' +
          '</div>';

        collapsedHTML +=
          '<div class="collapsed-badge' + (isActive ? ' active' : '') + '" data-id="' + s.id + '" onclick="window.__app.loadSession(\'' + s.id + '\')">' +
            count +
            '<span class="tooltip">' + escHTML(s.title || 'Untitled') + '</span>' +
          '</div>';
      }
    }

    document.getElementById('panel-list-expanded').innerHTML = expandedHTML;
    document.getElementById('panel-list-collapsed').innerHTML = collapsedHTML;
    document.getElementById('panel-footer').textContent =
      sessions.length + ' session' + (sessions.length !== 1 ? 's' : '') +
      ' \u00B7 ' + totalVideos + ' video' + (totalVideos !== 1 ? 's' : '');
  }

  function groupByDate(sessions) {
    const groups = {};
    const now = new Date();
    const todayStr = now.toDateString();
    const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = yesterday.toDateString();
    const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);

    for (const s of sessions) {
      const d = new Date(s.created_at);
      let label;
      if (d.toDateString() === todayStr) label = 'Today';
      else if (d.toDateString() === yesterdayStr) label = 'Yesterday';
      else if (d >= weekAgo) label = 'This Week';
      else label = 'Older';
      if (!groups[label]) groups[label] = [];
      groups[label].push(s);
    }
    return groups;
  }

  function togglePanel() {
    panelCollapsed = !panelCollapsed;
    document.getElementById('history-panel').classList.toggle('collapsed', panelCollapsed);
  }

  function filterSessions(query) {
    const q = query.toLowerCase();
    const filtered = q
      ? allSessions.filter(s =>
          (s.title || '').toLowerCase().includes(q) ||
          (s.channels || []).some(c => c.toLowerCase().includes(q))
        )
      : allSessions;
    renderHistoryPanel(filtered);
  }

  // ── Tabs ──

  function switchTab(tabName) {
    activeTab = tabName;
    document.querySelectorAll('.nav-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tabName);
    });
    renderActiveTab();
  }

  function renderActiveTab() {
    const el = document.getElementById('tab-content');
    if (!currentSessionData) {
      el.innerHTML = '<div class="placeholder-tab">Select a session to begin</div>';
      return;
    }
    switch (activeTab) {
      case 'dashboard': renderDashboard(currentSessionData); break;
      case 'by-topic': renderByTopic(currentSessionData); break;
      case 'by-video': renderByVideo(currentSessionData); break;
      default: el.innerHTML = '';
    }
  }

  // ── Dashboard ──

  function renderDashboard(data) {
    const el = document.getElementById('tab-content');
    const videos = data.videos || [];
    const topics = data.topics || data.common_topics || [];
    const disagreements = data.disagreements || [];
    const moments = data.key_moments || [];
    const summary = data.unified_summary || data.summary || '';

    const topicCount = Array.isArray(topics) ? topics.length : 0;
    const disagreeCount = Array.isArray(disagreements) ? disagreements.length : 0;
    const momentCount = Array.isArray(moments) ? moments.length : 0;

    let html = '';

    // Stats row
    html += '<div class="stats-grid">';
    html += statCard('Videos', videos.length, '#60a5fa');
    html += statCard('Common Topics', topicCount, '#34d399');
    html += statCard('Disagreements', disagreeCount, '#fbbf24');
    html += statCard('Key Moments', momentCount, '#f472b6');
    html += '</div>';

    // Unified Summary
    if (summary) {
      html += '<div class="card">';
      html += '<div class="card-header">Unified Summary</div>';
      html += '<p>' + escHTML(summary) + '</p>';
      html += '</div>';
    }

    // Topic Map
    if (topicCount > 0) {
      html += '<div class="card">';
      html += '<div class="card-header">Topic Map</div>';
      for (let i = 0; i < topics.length; i++) {
        const t = topics[i];
        const name = typeof t === 'string' ? t : (t.name || t.topic || 'Topic');
        const coverage = typeof t === 'object' ? (t.coverage || t.video_count || videos.length) : videos.length;
        const pct = videos.length > 0 ? Math.round((coverage / videos.length) * 100) : 0;
        const color = TOPIC_COLORS[i % TOPIC_COLORS.length];
        html +=
          '<div class="topic-bar-row">' +
            '<div class="topic-name" style="color:' + color + '">' + escHTML(name) + '</div>' +
            '<div class="topic-bar-track">' +
              '<div class="topic-bar-fill" style="width:' + pct + '%;background:' + color + '"></div>' +
            '</div>' +
            '<div class="topic-coverage">' + coverage + ' of ' + videos.length + ' videos</div>' +
          '</div>';
      }
      html += '</div>';
    }

    // Videos Compared
    if (videos.length > 0) {
      html += '<div class="card">';
      html += '<div class="card-header">Videos Compared</div>';
      html += '<div class="video-grid">';
      for (const v of videos) {
        const thumb = v.thumbnail_base64
          ? '<img src="data:image/jpeg;base64,' + v.thumbnail_base64 + '" alt="">'
          : (v.thumbnail
            ? '<img src="' + escAttr(v.thumbnail) + '" alt="">'
            : '<span>No thumbnail</span>');
        html +=
          '<div class="video-card">' +
            '<div class="video-thumb">' + thumb + '</div>' +
            '<div class="video-meta">' +
              '<div class="video-meta-title" title="' + escAttr(v.title || '') + '">' + escHTML(v.title || 'Untitled') + '</div>' +
              '<div class="video-meta-channel">' + escHTML(v.channel || v.channel_name || '') + '</div>' +
              (v.duration ? '<div class="video-meta-duration">' + formatTimestamp(v.duration) + '</div>' : '') +
            '</div>' +
          '</div>';
      }
      html += '</div></div>';
    }

    // Key Moments
    if (momentCount > 0) {
      html += '<div class="card">';
      html += '<div class="card-header">Key Moments</div>';
      html += '<div class="moments-grid">';
      for (let i = 0; i < moments.length; i++) {
        const m = moments[i];
        const colorIdx = m.video_index != null ? m.video_index : i;
        const color = TOPIC_COLORS[colorIdx % TOPIC_COLORS.length];
        const thumb = m.screenshot_base64
          ? '<img src="data:image/jpeg;base64,' + m.screenshot_base64 + '" alt="">'
          : (m.screenshot
            ? '<img src="' + escAttr(m.screenshot) + '" alt="">'
            : '');
        html +=
          '<div class="moment-card">' +
            '<div class="moment-thumb">' + thumb +
              '<span class="moment-timestamp">' + formatTimestamp(m.timestamp || 0) + '</span>' +
            '</div>' +
            '<div class="moment-info">' +
              '<div class="moment-label">' + escHTML(m.label || m.description || '') + '</div>' +
              '<div class="moment-source" style="color:' + color + '">' + escHTML(m.source || m.video_title || '') + '</div>' +
            '</div>' +
          '</div>';
      }
      html += '</div></div>';
    }

    el.innerHTML = html;
  }

  // ── Placeholder Tabs ──

  function renderByTopic(data) {
    const el = document.getElementById('tab-content');
    const analysis = data.analysis || data;
    const topics = analysis.topics || [];
    const videos = data.videos || [];
    const totalVideos = videos.length;

    // Sort topics by video_coverage length descending
    const sorted = topics.slice().sort((a, b) =>
      (b.video_coverage || []).length - (a.video_coverage || []).length
    );

    let html = '';
    sorted.forEach((topic, idx) => {
      const color = TOPIC_COLORS[idx % TOPIC_COLORS.length];
      const coverageCount = (topic.video_coverage || []).length;
      const consensus = (topic.consensus || '').toLowerCase();
      const expanded = idx === 0;

      // Consensus badge
      let consensusColor = '#64748b';
      if (consensus === 'agreement') consensusColor = '#34d399';
      else if (consensus === 'divided') consensusColor = '#fbbf24';
      else if (consensus === 'skeptical') consensusColor = '#f472b6';

      const sectionId = 'topic-section-' + idx;

      html += '<div class="topic-section">';
      // Header
      html += '<div class="topic-header" onclick="window.__app.toggleTopic(\'' + sectionId + '\')">';
      html += '<div style="display:flex;align-items:center;gap:12px;min-width:0">';
      // Color indicator bar
      html += '<div style="width:4px;height:28px;border-radius:2px;background:' + color + ';flex-shrink:0"></div>';
      // Name + coverage + consensus
      html += '<div style="min-width:0">';
      html += '<div style="font-size:14px;font-weight:700;color:#e2e8f0">' + escHTML(topic.name) + '</div>';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-top:2px">';
      html += '<span style="font-size:11px;color:#64748b">Discussed in ' + coverageCount + ' of ' + totalVideos + ' videos</span>';
      if (consensus) {
        html += '<span style="font-size:10px;font-weight:600;color:' + consensusColor + '">' + escHTML(topic.consensus) + '</span>';
      }
      html += '</div></div></div>';
      // Arrow
      html += '<span id="' + sectionId + '-arrow" style="color:#64748b;font-size:12px;flex-shrink:0">' + (expanded ? '\u25BC' : '\u25B6') + '</span>';
      html += '</div>';

      // Entries
      html += '<div class="topic-entries" id="' + sectionId + '" style="' + (expanded ? '' : 'display:none') + '">';
      const entries = topic.entries || [];
      entries.forEach(entry => {
        const video = videos.find(v => v.id === entry.video_id);
        const channelName = video ? (video.channel || video.channel_name || 'Unknown') : 'Unknown';
        const ts = formatTimestamp(entry.timestamp || 0);

        html += '<div class="topic-entry">';
        // Thumbnail
        html += '<div class="topic-thumb">';
        if (entry.screenshot_base64) {
          html += '<img src="data:image/png;base64,' + entry.screenshot_base64 + '" alt="">';
        } else {
          html += '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:9px">screenshot</div>';
        }
        html += '<span class="ts-overlay">' + ts + '</span>';
        html += '</div>';
        // Content
        html += '<div style="min-width:0;flex:1">';
        html += '<div style="display:flex;align-items:center;gap:6px">';
        html += '<span style="font-size:11px;font-weight:700;color:' + color + '">' + escHTML(channelName) + '</span>';
        html += '<span style="color:#64748b;font-size:10px">\u2022</span>';
        html += '<span style="font-size:10px;color:#64748b">' + ts + '</span>';
        html += '</div>';
        if (entry.quote) {
          html += '<div style="font-size:12px;color:#94a3b8;line-height:1.4;margin-top:4px">' + escHTML(entry.quote) + '</div>';
        }
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
      html += '</div>';
    });

    if (sorted.length === 0) {
      html = '<div class="placeholder-tab">No topics found in this session</div>';
    }

    el.innerHTML = html;
  }

  function toggleTopicSection(sectionId) {
    const entries = document.getElementById(sectionId);
    const arrow = document.getElementById(sectionId + '-arrow');
    if (!entries) return;
    const visible = entries.style.display !== 'none';
    entries.style.display = visible ? 'none' : 'grid';
    if (arrow) arrow.textContent = visible ? '\u25B6' : '\u25BC';
  }

  function renderByVideo(data) {
    document.getElementById('tab-content').innerHTML =
      '<div class="placeholder-tab">By Video — Coming soon...</div>';
  }

  // ── Helpers ──

  function formatTimestamp(seconds) {
    if (typeof seconds !== 'number' || isNaN(seconds)) return '0:00';
    const s = Math.round(seconds);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function formatTime(isoStr) {
    if (!isoStr) return '';
    try {
      const d = new Date(isoStr);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }

  function escHTML(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(s) {
    return escHTML(s);
  }

  function statCard(label, value, color) {
    return '<div class="stat-card">' +
      '<div class="stat-label" style="color:' + color + '">' + escHTML(label) + '</div>' +
      '<div class="stat-value" style="color:' + color + '">' + value + '</div>' +
    '</div>';
  }

  // ── Init ──

  async function init() {
    await loadSessions();
    if (allSessions.length > 0) {
      await loadSession(allSessions[0].id);
    } else {
      renderActiveTab();
    }
  }

  // Expose for onclick handlers
  window.__app = { loadSession, togglePanel: togglePanel, toggleTopic: toggleTopicSection };
  window.togglePanel = togglePanel;
  window.switchTab = switchTab;
  window.filterSessions = filterSessions;

  // Expose named functions for external use
  window.loadSession = loadSession;
  window.loadSessions = loadSessions;
  window.renderDashboard = renderDashboard;
  window.renderHistoryPanel = renderHistoryPanel;
  window.formatTimestamp = formatTimestamp;

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
